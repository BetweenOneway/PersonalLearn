<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Span点击事件示例</title>
    <style>
        /* 简单美化页面，提升体验 */
        body {
            font-family: Arial, sans-serif;
            padding: 50px;
            max-width: 600px;
            margin: 0 auto;
        }
        #clickSpan {
            color: #2c68c8;
            cursor: pointer; /* 鼠标悬浮显示手型，提示可点击 */
            text-decoration: underline;
        }
        #clickSpan:hover {
            color: #1a4b99;
        }
        #message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            display: none; /* 初始隐藏信息 */
            background-color: #f0f8ff;
            border: 1px solid #d0e8ff;
        }
    </style>
</head>
<body>
    <!-- 可点击的span元素 -->
    <span id="clickSpan">点击我查看惊喜信息 🎉</span>
    
    <!-- 用于显示点击后的信息 -->
    <div id="message"></div>

    <script>
        // 1. 获取页面元素
        const clickSpan = document.getElementById('clickSpan');
        const messageBox = document.getElementById('message');

        // 2. 定义点击事件处理函数
        function handleSpanClick() {
            // 设置要显示的信息内容
            const info = '你点击了span元素！🎉 这是一条自定义的提示信息，你可以随意修改内容~';
            // 将信息填充到展示区域
            messageBox.textContent = info;
            // 显示信息区域
            messageBox.style.display = 'block';
        }

        // 3. 给span元素绑定click事件
        clickSpan.addEventListener('click', handleSpanClick);
    </script>
</body>
</html>
