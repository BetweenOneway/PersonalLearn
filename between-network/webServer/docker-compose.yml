# =============================================================================
# CloudNoteServer DevContainer — Node.js/Express 后端开发环境
#
# 使用方式：
#   1. 用 VSCode 打开 webServer/ 目录 → Reopen in Container
#   2. 在容器终端执行 npm run dev:linux 启动后端
#   3. MySQL + Redis 已包含在此 compose 中，无需单独启动
# =============================================================================

services:
  # ==================== 后端 — Node.js/Express（DevContainer 连接目标） ====================
  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: between_network_server
    env_file:
      - dev.env
    depends_on:
      redis:
        condition: service_started
      mysql:
        condition: service_healthy
    volumes:
      # 源码挂载，实现热重载
      - .:/app:cached
      # 排除 node_modules 避免与容器内不一致
      - /app/node_modules
      # 持久化 VSCode 扩展
      - vscode-extensions:/root/.vscode-server/extensions
      - vscode-extensions-insiders:/root/.vscode-server-insiders
    ports:
      - "18081:18081"
    command: sleep infinity
    networks:
      - between_network_net

  # ==================== Redis 缓存 ====================
  redis:
    image: redis:7-alpine
    container_name: between_network_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - between_network_net

  # ==================== MySQL 数据库 ====================
  mysql:
    image: mysql:8.0
    container_name: between_network_mysql
    ports:
      - "3306:3306"
    env_file:
      - dev.env
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u${MYSQL_USER:-root}", "-p${MYSQL_ROOT_PASSWORD:-root123}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - between_network_net

volumes:
  redis_data:
  mysql_data:
  vscode-extensions:
  vscode-extensions-insiders:

networks:
  between_network_net:
    name: between_network_net
    driver: bridge
