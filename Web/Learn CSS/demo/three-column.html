<!DOCTYPE html>
<html>
    <head>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            .three-column {
                display: flex;
                min-height: 400px;
            }
            .left, .right {
                width: 200px;
                flex-shrink: 0;
                background: #e8f4ff;
                padding: 20px;
            }
            .center {
                flex: 1;
                background: #fff;
                padding: 20px;
            }
        </style>
    </head>
    <body>
        <div class="three-column">
            <div class="left">左栏 200px</div>
            <div class="center">中间自适应主体（优先渲染）</div>
            <div class="right">右栏 200px</div>
          </div>
    </body>
</html>
