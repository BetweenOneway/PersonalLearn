# =============================================================================
# DevDockerCompositeDemo — 全量启动（不使用 DevContainer 时使用）
#
# 一键启动全部 4 个服务：client + server + redis + mysql
#
# 使用方式：
#   docker-compose up -d
#   然后 docker exec -it devcompose_server bash → npm start
#   访问 http://localhost:8080
#
# 如果使用 DevContainer 开发，请分别打开 server/ 或 client/ 目录。
# =============================================================================

services:
  # ==================== 前端 — Vue 3 + Vite（生产模式：Nginx 托管静态文件） ====================
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: devcompose_client
    ports:
      - "8080:80"
    depends_on:
      - server
    networks:
      - devcompose_net

  # ==================== 后端 — Node.js/Express ====================
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: devcompose_server
    env_file:
      - dev.env
    depends_on:
      redis:
        condition: service_started
      mysql:
        condition: service_healthy
    volumes:
      - ./server:/app:cached
    ports:
      - "3000:3000"
    command: sleep infinity
    networks:
      - devcompose_net

  # ==================== Redis 缓存 ====================
  redis:
    image: redis:7-alpine
    container_name: devcompose_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - devcompose_net

  # ==================== MySQL 数据库 ====================
  mysql:
    image: mysql:8.0
    container_name: devcompose_mysql
    ports:
      - "3306:3306"
    env_file:
      - dev.env
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u${MYSQL_USER:-root}", "-p${MYSQL_ROOT_PASSWORD:-root123}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - devcompose_net

volumes:
  redis_data:
  mysql_data:

networks:
  devcompose_net:
    name: devcompose_net
    driver: bridge
