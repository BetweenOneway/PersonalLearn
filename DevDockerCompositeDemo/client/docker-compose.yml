version: "3.9"

# =============================================================================
# Client DevContainer — Vue 3 + Vite 前端开发环境
#
# 使用方式：
#   1. 先启动 Server DevContainer（含 redis/mysql 基础设施）
#   2. 用 VSCode 打开 client/ 目录 → Reopen in Container
#   3. Vite 开发服务器自动启动，支持 HMR 热更新
#
# 注意：redis 和 mysql 由 server/docker-compose.yml 统一管理，
#       client 通过共享网络 devcompose_net 访问即可。
# =============================================================================

services:
  # ==================== 前端 — Vue 3 + Vite（DevContainer 连接目标） ====================
  client:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: devcompose_client
    ports:
      - "5173:5173"
    volumes:
      # 源码挂载，实现热重载
      - .:/app:cached
      # 持久化 VSCode 扩展
      - vscode-extensions-client:/root/.vscode-server/extensions
      - vscode-extensions-client-insiders:/root/.vscode-server-insiders
    # DevContainer 需要保持容器运行
    command: sleep infinity
    networks:
      - devcompose_net

volumes:
  vscode-extensions-client:
  vscode-extensions-client-insiders:

networks:
  devcompose_net:
    external: true
