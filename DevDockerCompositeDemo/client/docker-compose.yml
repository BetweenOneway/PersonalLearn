version: "3.9"

# =============================================================================
# Client DevContainer — Vue 3 + Vite 前端开发环境
#
# 使用方式：
#   1. 先启动基础设施：cd .. && docker-compose -f docker-compose.infra.yml up -d
#   2. 用 VSCode 打开 client/ 目录 → Reopen in Container
#   3. Vite 开发服务器自动启动，支持 HMR 热更新
# =============================================================================

services:
  # ==================== 前端 — Vue 3 + Vite（DevContainer 连接目标） ====================
  client:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: devcompose_client
    ports:
      - "5173:5173"
    volumes:
      # 源码挂载，实现热重载
      - .:/app:cached
      # 持久化 VSCode 扩展
      - vscode-extensions-client:/root/.vscode-server/extensions
      - vscode-extensions-client-insiders:/root/.vscode-server-insiders
    # DevContainer 需要保持容器运行
    command: sleep infinity
    networks:
      - devcompose_net

  # ==================== Redis 缓存（引用基础设施网络） ====================
  redis:
    image: redis:7-alpine
    container_name: devcompose_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - devcompose_net

  # ==================== MySQL 数据库（引用基础设施网络） ====================
  mysql:
    image: mysql:8.0
    container_name: devcompose_mysql
    ports:
      - "3306:3306"
    env_file:
      - ../dev.env
    volumes:
      - mysql_data:/var/lib/mysql
      - ../init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u${MYSQL_USER:-root}", "-p${MYSQL_ROOT_PASSWORD:-root123}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - devcompose_net

volumes:
  redis_data:
  mysql_data:
  vscode-extensions-client:
  vscode-extensions-client-insiders:

networks:
  devcompose_net:
    name: devcompose_net
    driver: bridge
