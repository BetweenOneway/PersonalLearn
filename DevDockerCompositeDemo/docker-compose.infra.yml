version: "3.9"

# =============================================================================
# 基础设施服务 — Redis + MySQL
# 供 server 和 client 的 DevContainer 共享使用
#
# 启动方式：
#   docker-compose -f docker-compose.infra.yml up -d
# =============================================================================

services:
  # ==================== Redis 缓存 ====================
  redis:
    image: redis:7-alpine
    container_name: devcompose_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - devcompose_net

  # ==================== MySQL 数据库 ====================
  mysql:
    image: mysql:8.0
    container_name: devcompose_mysql
    ports:
      - "3306:3306"
    env_file:
      - dev.env
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u${MYSQL_USER:-root}", "-p${MYSQL_ROOT_PASSWORD:-root123}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - devcompose_net

volumes:
  redis_data:
  mysql_data:

networks:
  devcompose_net:
    name: devcompose_net
    driver: bridge
