version: "3.9"

services:
  # ==================== Flask Web 应用 ====================
  web:
    build: .
    container_name: compose_web
    ports:
      - "8000:5000"
    environment:
      - FLASK_ENV=development
      - REDIS_HOST=redis
    depends_on:
      - redis
    volumes:
      - ./app:/app

  # ==================== Redis 缓存 ====================
  redis:
    image: redis:7-alpine
    container_name: compose_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  redis_data:
