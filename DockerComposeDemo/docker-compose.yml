version: "3.9"

services:
  # ==================== Flask Web 应用 ====================
  web:
    build: .
    container_name: compose_web
    ports:
      - "8000:5000"
    env_file:
      - dev.env
    depends_on:
      redis:
        condition: service_started
      mysql:
        condition: service_healthy
    volumes:
      - ./app:/app

  # ==================== Redis 缓存 ====================
  redis:
    image: redis:7-alpine
    container_name: compose_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # ==================== MySQL 数据库 ====================
  mysql:
    image: mysql:8.0
    container_name: compose_mysql
    ports:
      - "3306:3306"
    env_file:
      - dev.env
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u${MYSQL_USER:-root}", "-p${MYSQL_ROOT_PASSWORD:-root123}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  redis_data:
  mysql_data:
